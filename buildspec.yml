version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing dependencies ==="
      - npm ci

  build:
    commands:
      - echo "=== Building React/Vite app ==="
      - npm run build
      - echo "=== Build complete ==="

  post_build:
    commands:
      - echo "=== Post-build: preparing artifact ==="
      - ls -la dist/

artifacts:
  files:
    - appspec.yml
    - scripts/**/*
    - nginx/**/*
    - dist/**/*
  discard-paths: no
